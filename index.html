<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Atrapa el Cuadrado</title>

<style>
body{
    margin:0;
    background:#1b1b1b;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
    text-align:center;
}

h1{
    margin-top:20px;
}

#game{
    width:700px;
    height:450px;
    margin:20px auto;
    background:white;
    border-radius:10px;
    position:relative;
    overflow:hidden;
}

#target{
    width:50px;
    height:50px;
    background:#ff3b30;
    position:absolute;
    border-radius:8px;
    cursor:pointer;
    transition:.15s;
}

.info{
    font-size:22px;
}
</style>

</head>
<body>

<h1>🎯 Atrapa el Cuadrado</h1>

<div class="info">
Puntos:
<span id="score">0</span>

&nbsp;&nbsp;&nbsp;

Tiempo:
<span id="time">30</span>s
</div>

<div id="game">
<div id="target"></div>
</div>

<h2 id="result"></h2>

<script>

const target=document.getElementById("target");
const game=document.getElementById("game");

let score=0;
let time=30;

function moveTarget(){

    const x=Math.random()*(game.clientWidth-50);
    const y=Math.random()*(game.clientHeight-50);

    target.style.left=x+"px";
    target.style.top=y+"px";
}

moveTarget();

target.onclick=function(){

    score++;

    document.getElementById("score").textContent=score;

    moveTarget();

}

const timer=setInterval(function(){

    time--;

    document.getElementById("time").textContent=time;

    if(time<=0){

        clearInterval(timer);

        target.style.display="none";

        let mensaje="";

        if(score<10)
            mensaje="😅 Puedes hacerlo mejor.";

        else if(score<20)
            mensaje="👏 ¡Buen trabajo!";

        else if(score<35)
            mensaje="🔥 ¡Excelente velocidad!";

        else
            mensaje="🚀 ¡Eres un profesional!";

        document.getElementById("result").innerHTML=
        "Juego terminado.<br>Puntaje final: <b>"+score+
        "</b><br>"+mensaje;
    }

},1000);

moveTarget();

</script>

</body>
</html>
